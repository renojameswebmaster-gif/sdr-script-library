<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Professional SDR cold-call script library for sales teams." />
    <title>SDR Script Library</title>
    <link rel="stylesheet" href="styles.css?v=12" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <div class="header-container">
        <div class="header-logo">
          <div class="logo-text">SDR Scripts</div>
        </div>
        <nav class="header-nav">
          <button class="nav-btn active" data-category="all">All Scripts</button>
          <button class="nav-btn" data-category="Opening">Opening</button>
          <button class="nav-btn" data-category="Objections">Objections</button>
          <button class="nav-btn" data-category="Closing">Closing</button>
        </nav>
      </div>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
      <input 
        id="search-input" 
        type="search" 
        placeholder="Search scripts by keyword..." 
        autocomplete="off" 
      />
    </div>

    <!-- Main Content -->
    <main class="content">
      <div id="scripts-container" class="scripts-container"></div>
    </main>

    <!-- Floating Action Buttons -->
    <div class="floating-actions">
      <button id="copy-toast" class="fab" title="Last action">📋</button>
      <button id="back-top" class="fab" title="Back to top">⬆</button>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="script.js?v=12"></script>
  </body>
</html>
